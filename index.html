<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Hub - Neuroscience-Based Tools</title>
    
    <!-- React and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #111827 0%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ea580c;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #c2410c;
        }

        /* Loading animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .spinner {
            border: 4px solid #374151;
            border-top: 4px solid #ea580c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error state */
        .error {
            padding: 20px;
            text-align: center;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 8px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div class="spinner"></div>
            <h2 style="color: #ea580c; margin: 0;">Loading Productivity Hub...</h2>
            <p style="color: #9ca3af; margin-top: 10px;">Please wait while we initialize the app</p>
        </div>
    </div>
    
    <!-- Load the React app -->
    <script type="text/babel" src="app.js"></script>
    
    <!-- Initialize the app -->
    <script type="text/babel">
        console.log('Starting Productivity Hub initialization...');
        
        // Check if all dependencies are loaded
        function checkDependencies() {
            const deps = {
                React: typeof React !== 'undefined',
                ReactDOM: typeof ReactDOM !== 'undefined',
                App: typeof window.App !== 'undefined'
            };
            
            console.log('Dependencies status:', deps);
            return Object.values(deps).every(Boolean);
        }
        
        // Render the app
        function renderApp() {
            console.log('Attempting to render app...');
            
            if (!checkDependencies()) {
                console.log('Dependencies not ready, retrying in 200ms...');
                setTimeout(renderApp, 200);
                return;
            }
            
            try {
                const rootElement = document.getElementById('root');
                const root = ReactDOM.createRoot(rootElement);
                root.render(<window.App />);
                console.log('✅ App rendered successfully!');
            } catch (error) {
                console.error('❌ Error rendering app:', error);
                document.getElementById('root').innerHTML = `
                    <div class="error">
                        <h2 style="color: #ef4444; margin-bottom: 10px;">Error Loading App</h2>
                        <p style="color: #9ca3af; margin-bottom: 15px;">${error.message}</p>
                        <button onclick="location.reload()" style="background: #ea580c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
                            🔄 Reload Page
                        </button>
                    </div>
                `;
            }
        }
        
        // Wait for everything to load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                console.log('DOM loaded, waiting for scripts...');
                setTimeout(renderApp, 500);
            });
        } else {
            console.log('DOM already loaded, waiting for scripts...');
            setTimeout(renderApp, 500);
        }
        
        // Fallback: try rendering after a longer delay
        setTimeout(function() {
            if (document.getElementById('root').children.length === 1 && 
                document.getElementById('root').children[0].classList.contains('loading')) {
                console.log('Fallback render attempt...');
                renderApp();
            }
        }, 3000);
    </script>
</body>
</html>
